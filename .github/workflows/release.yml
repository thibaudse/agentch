name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build DMG
        run: make dmg

      - name: Checksum
        run: shasum -a 256 AgentCh.dmg > AgentCh.dmg.sha256

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgentCh.dmg
            AgentCh.dmg.sha256
          generate_release_notes: true
